<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Stage Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .nav-back {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .nav-back:hover { color: #fff; }
        .page-title { font-size: 28px; font-weight: 700; }
        .top-controls {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .search-form { display: flex; gap: 10px; flex: 1; max-width: 400px; }
        .input-search {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
            font-size: 14px;
        }
        .input-search:focus { border-color: #7c3aed; }
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #6366f1); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-edit { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); padding: 6px 12px; font-size: 12px; }
        .btn-edit:hover { background: rgba(56, 189, 248, 0.3); }
        .btn-delete { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); padding: 6px 12px; font-size: 12px; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.3); }
        
        .alert {
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }
        .alert-error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px 24px; font-size: 14px; }
        th { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.6); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .code-badge { background: rgba(124, 58, 237, 0.2); color: #c084fc; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .actions-cell { display: flex; gap: 8px; }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/home}" class="nav-back">← Back to Dashboard</a>
    
    <div class="header-bar">
        <h1 class="page-title">🏢 Departments</h1>
        <a th:href="@{/departments/new}" class="btn btn-primary">+ Add New Department</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="top-controls">
        <form th:action="@{/departments}" method="get" class="search-form">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by name or code..." class="input-search">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:if="${keyword != null and !keyword.empty}" th:href="@{/departments}" class="btn" style="background: rgba(255,255,255,0.1); color:#fff;">Clear</a>
        </form>
    </div>

    <div class="glass-card">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Location</th>
                    <th>Budget</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dept : ${departments}">
                    <td th:text="${dept.id}">1</td>
                    <td><span class="code-badge" th:text="${dept.code}">ENG</span></td>
                    <td th:text="${dept.name}">Engineering</td>
                    <td th:text="${dept.location != null ? dept.location : '-'}">Building A</td>
                    <td th:text="${dept.budget != null ? '$' + #numbers.formatDecimal(dept.budget, 1, 2) : '-'}">$250,000</td>
                    <td class="actions-cell">
                        <a th:href="@{/departments/edit/{id}(id=${dept.id})}" class="btn btn-edit">Edit</a>
                        <a th:href="@{/departments/delete/{id}(id=${dept.id})}" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this department?');">Delete</a>
                    </td>
                </tr>
                <tr th:if="${departments.empty}">
                    <td colspan="6" class="empty-state">No departments found. Click "+ Add New Department" to create one.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
