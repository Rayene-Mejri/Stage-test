<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - Stage Test'">Department Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .nav-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; margin-bottom: 20px; display: inline-block; }
        .nav-back:hover { color: #fff; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        .form-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: rgba(255, 255, 255, 0.8); }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }
        .form-control:focus { border-color: #7c3aed; background: rgba(255, 255, 255, 0.08); }
        .text-error { color: #fca5a5; font-size: 12px; margin-top: 6px; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/departments}" class="nav-back">← Back to Departments</a>

    <div class="glass-card">
        <h2 class="form-title" th:text="${pageTitle}">Department Form</h2>

        <form th:action="@{/departments/save}" th:object="${department}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label class="form-label" for="name">Department Name *</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g. Engineering">
                <div class="text-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="code">Department Code *</label>
                <input type="text" id="code" th:field="*{code}" class="form-control" placeholder="e.g. ENG">
                <div class="text-error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="location">Location</label>
                <input type="text" id="location" th:field="*{location}" class="form-control" placeholder="e.g. Building A - 3rd Floor">
            </div>

            <div class="form-group">
                <label class="form-label" for="budget">Annual Budget ($)</label>
                <input type="number" step="0.01" id="budget" th:field="*{budget}" class="form-control" placeholder="e.g. 250000">
            </div>

            <button type="submit" class="btn-submit">Save Department</button>
        </form>
    </div>
</div>

</body>
</html>
