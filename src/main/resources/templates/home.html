<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Stage Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            overflow: hidden;
        }

        .bg-circles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-circles .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
            animation: float 8s ease-in-out infinite;
        }
        .bg-circles .circle:nth-child(1) {
            width: 500px; height: 500px;
            background: #22c55e;
            top: -150px; left: -150px;
            animation-delay: 0s;
        }
        .bg-circles .circle:nth-child(2) {
            width: 350px; height: 350px;
            background: #7c3aed;
            bottom: -100px; right: -100px;
            animation-delay: 2s;
        }
        .bg-circles .circle:nth-child(3) {
            width: 250px; height: 250px;
            background: #f59e0b;
            top: 60%; left: 50%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .home-container {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 80px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .emoji {
            font-size: 64px;
            margin-bottom: 24px;
            animation: wave 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }

        .welcome-text {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .username-text {
            color: #fff;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .username-highlight {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .btn-logout {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="bg-circles">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="home-container">
    <div class="welcome-card">
        <p class="welcome-text">Welcome</p>
        <h1 class="username-text">
            Hello, <span class="username-highlight" th:text="${username}">User</span>!
        </h1>
        <p class="subtitle">You are successfully logged in</p>

        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn-logout">Sign Out</button>
        </form>
    </div>
</div>

</body>
</html>
